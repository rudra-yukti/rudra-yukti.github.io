<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Under Maintenance</title>

<style>
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #0f172a;
        color: #e2e8f0;
        font-family: Arial, sans-serif;
        text-align: center;
    }

    .container {
        max-width: 500px;
    }

    h1 {
        font-size: 2.5rem;
        margin-bottom: 10px;
    }

    p {
        color: #94a3b8;
        margin-bottom: 30px;
    }

    /* Robot */
    .robot {
        width: 120px;
        margin: 0 auto 30px;
        position: relative;
        animation: float 2s ease-in-out infinite;
    }

    .head {
        width: 100px;
        height: 70px;
        background: #1e293b;
        border-radius: 10px;
        position: relative;
        margin: auto;
    }

    .eye {
        width: 12px;
        height: 12px;
        background: #38bdf8;
        border-radius: 50%;
        position: absolute;
        top: 25px;
        animation: blink 3s infinite;
    }

    .eye.left { left: 25px; }
    .eye.right { right: 25px; }

    .body {
        width: 80px;
        height: 60px;
        background: #334155;
        margin: 10px auto;
        border-radius: 8px;
    }

    .arm {
        width: 15px;
        height: 50px;
        background: #475569;
        position: absolute;
        top: 80px;
        animation: wave 2s infinite ease-in-out;
        transform-origin: top center;
    }

    .arm.left { left: -10px; }
    .arm.right { right: -10px; animation-delay: 1s; }

    /* Animations */
    @keyframes blink {
        0%, 90%, 100% { height: 12px; }
        95% { height: 2px; }
    }

    @keyframes wave {
        0%, 100% { transform: rotate(0deg); }
        50% { transform: rotate(25deg); }
    }

    @keyframes float {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-8px); }
    }

    .footer {
        font-size: 0.8rem;
        color: #64748b;
        margin-top: 20px;
    }
</style>
</head>

<body>
    <div class="container">
        <div class="robot">
            <div class="head">
                <div class="eye left"></div>
                <div class="eye right"></div>
            </div>
            <div class="body"></div>
            <div class="arm left"></div>
            <div class="arm right"></div>
        </div>

        <h1>We’re Fixing Things 🔧</h1>
        <p>Our robots are working hard to bring the site back soon.</p>

        <div class="footer">
            Rudra
        </div>
    </div>
</body>
</html>
